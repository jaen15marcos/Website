<script>

function setMain() {
	document.getElementById('main-form').addEventListener('submit', suppressEvent, false);
	getJSON(MARKETS_JSON, loadMarkets);
}

function loadMarkets(json) {
	MARKETS = JSON.parse(json);
	var html = '<select id="market-select" onchange="showSelectedMarket()">';
	html += makeSelectMarketOptions();
	html += '</select>';
	document.getElementById('market-span').innerHTML = html;
	showSelectedMarket();
}

function showSelectedMarket() {
	var mic = document.getElementById('market-select').value;
	localStorage.setItem('mic', mic);
	var market = MARKETS[mic];
	document.getElementById('mic-span').innerHTML = mic;
	document.getElementById('hours-span').innerHTML = market.hours;
	var html = '<table>';
	var x = null;
	for (var i = 0; i < market.ticks.length; i++) {
		html += '<tr><td>';
		x = market.ticks[i];
		if (x.until == 0) {
			html += 'then';
		} else {
			html += 'until ' + market.currency + ' ' + x.until;
		}
		html += '<td>' + x.tick;
	}
	html += '</table>';
	document.getElementById('tick-bands-span').innerHTML = html;
	html = '<table><tr><th><th>Matching<th>Limit orders<th>Market orders';
	x = null;
	for (var i = 0; i < market.sessions.length; i++) {
		html += '<tr><td>';
		x = market.sessions[i];
		html += x.from + ' - ' + x.until;
		html += '<td>' + x.matching;
		html += '<td>' + x.atlimit;
		html += '<td>' + x.atmarket;
	}
	html += '</table>';
	document.getElementById('sessions-span').innerHTML = html;
}

</script>
